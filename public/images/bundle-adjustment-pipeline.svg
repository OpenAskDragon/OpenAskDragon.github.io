<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="680" viewBox="0 0 1400 680" role="img" aria-labelledby="title desc">
  <title id="title">Bundle adjustment: from image measurements to a jointly refined reconstruction</title>
  <desc id="desc">An original explanatory pipeline showing images, feature tracks, initialization, robust bundle adjustment, and refined cameras with 3D points.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#dff1ff"/><stop offset="1" stop-color="#f8fcff"/></linearGradient>
    <linearGradient id="ba" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#183b67"/><stop offset="1" stop-color="#275b93"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#17324d" flood-opacity=".14"/></filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#6f8298"/></marker>
    <marker id="arrowLight" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#c8e5ff"/></marker>
    <style>
      .h { font: 700 25px Arial, Helvetica, sans-serif; fill: #17324d; }
      .k { font: 700 15px Arial, Helvetica, sans-serif; letter-spacing: 1.2px; fill: #59718a; }
      .l { font: 700 18px Arial, Helvetica, sans-serif; fill: #17324d; }
      .s { font: 14px Arial, Helvetica, sans-serif; fill: #50657b; }
      .tiny { font: 12px Arial, Helvetica, sans-serif; fill: #698096; }
      .formula { font: 16px Georgia, 'Times New Roman', serif; fill: #eef7ff; }
    </style>
  </defs>
  <rect width="1400" height="680" fill="#f6f9fc"/>
  <rect x="28" y="24" width="1344" height="632" rx="26" fill="#fff" stroke="#d8e4ef"/>
  <text x="70" y="75" class="h">Bundle adjustment turns scattered measurements into one consistent reconstruction</text>
  <text x="70" y="103" class="s">Each stage adds structure; the optimization stage coordinates the same observations together.</text>

  <!-- Stage 1: images -->
  <g filter="url(#shadow)">
    <rect x="62" y="160" width="210" height="330" rx="18" fill="#fff" stroke="#cdddea"/>
  </g>
  <text x="84" y="197" class="k">01 · MEASURE</text>
  <text x="84" y="226" class="l">Image observations</text>
  <g transform="translate(88 254)">
    <g>
      <rect width="92" height="72" rx="7" fill="url(#sky)" stroke="#a8c8df"/>
      <path d="M4 60 L31 26 L52 49 L69 18 L88 60 Z" fill="#8db4a1"/>
      <path d="M4 62 H88" stroke="#5d9a85" stroke-width="8"/>
      <circle cx="29" cy="38" r="4" fill="#ff7757"/><circle cx="55" cy="49" r="4" fill="#ffc857"/><circle cx="72" cy="31" r="4" fill="#4b9fea"/>
    </g>
    <g transform="translate(18 83)">
      <rect width="92" height="72" rx="7" fill="url(#sky)" stroke="#a8c8df"/>
      <path d="M4 60 L22 38 L43 19 L61 47 L87 28 L88 60 Z" fill="#91b8a3"/>
      <path d="M4 62 H88" stroke="#5d9a85" stroke-width="8"/>
      <circle cx="37" cy="30" r="4" fill="#ff7757"/><circle cx="61" cy="48" r="4" fill="#ffc857"/><circle cx="76" cy="37" r="4" fill="#4b9fea"/>
    </g>
  </g>
  <text x="84" y="449" class="s">pixels zᵢⱼ</text>
  <text x="84" y="470" class="tiny">noisy, partial observations</text>

  <!-- connector 1 -->
  <path d="M286 325 H342" fill="none" stroke="#6f8298" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="314" y="128" text-anchor="middle" class="tiny">detect + match</text>

  <!-- Stage 2: tracks -->
  <g filter="url(#shadow)"><rect x="356" y="160" width="210" height="330" rx="18" fill="#fff" stroke="#cdddea"/></g>
  <text x="378" y="197" class="k">02 · ORGANIZE</text>
  <text x="378" y="226" class="l">Feature tracks</text>
  <g transform="translate(380 258)">
    <rect width="48" height="49" rx="7" fill="#eaf4fd" stroke="#9dc6e6"/><rect x="70" width="48" height="49" rx="7" fill="#eaf4fd" stroke="#9dc6e6"/><rect x="140" width="48" height="49" rx="7" fill="#eaf4fd" stroke="#9dc6e6"/>
    <circle cx="24" cy="15" r="5" fill="#ff7757"/><circle cx="94" cy="23" r="5" fill="#ff7757"/><circle cx="164" cy="30" r="5" fill="#ff7757"/>
    <path d="M24 15 L94 23 L164 30" fill="none" stroke="#ff7757" stroke-width="2.5"/>
    <circle cx="24" cy="31" r="5" fill="#4b9fea"/><circle cx="94" cy="35" r="5" fill="#4b9fea"/><circle cx="164" cy="15" r="5" fill="#4b9fea"/>
    <path d="M24 31 L94 35 L164 15" fill="none" stroke="#4b9fea" stroke-width="2.5"/>
    <circle cx="24" cy="42" r="4" fill="#ffc857"/><circle cx="94" cy="10" r="4" fill="#ffc857"/><circle cx="164" cy="43" r="4" fill="#ffc857"/>
    <path d="M24 42 L94 10 L164 43" fill="none" stroke="#ffc857" stroke-width="2.5"/>
    <text x="10" y="74" class="tiny">image i</text><text x="80" y="74" class="tiny">image k</text><text x="149" y="74" class="tiny">image m</text>
  </g>
  <rect x="380" y="367" width="162" height="50" rx="10" fill="#f6f9fc" stroke="#d6e2ec"/>
  <text x="395" y="389" class="tiny">one track = repeated</text><text x="395" y="407" class="tiny">views of one candidate point</text>
  <text x="378" y="455" class="s">accepted observation set 𝒪</text>

  <!-- connector 2 -->
  <path d="M580 325 H636" fill="none" stroke="#6f8298" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="608" y="128" text-anchor="middle" class="tiny">seed geometry</text>

  <!-- Stage 3: initial -->
  <g filter="url(#shadow)"><rect x="650" y="160" width="210" height="330" rx="18" fill="#fff" stroke="#cdddea"/></g>
  <text x="672" y="197" class="k">03 · INITIALIZE</text>
  <text x="672" y="226" class="l">A feasible starting point</text>
  <g transform="translate(675 263)">
    <path d="M7 88 L28 74 L28 102 Z" fill="#4b9fea"/><path d="M154 36 L177 22 L177 50 Z" fill="#4b9fea"/>
    <path d="M28 87 L93 56 L177 36 M28 87 L104 112 L177 36" stroke="#8ba8c2" stroke-width="2"/>
    <circle cx="93" cy="56" r="7" fill="#ff7757"/><circle cx="104" cy="112" r="7" fill="#ffc857"/><circle cx="130" cy="75" r="6" fill="#63b38a"/>
    <path d="M28 87 L130 75 L177 36" stroke="#b3c7d8" stroke-width="1.5" stroke-dasharray="4 4"/>
    <text x="7" y="131" class="tiny">relative poses + triangulation</text>
  </g>
  <text x="672" y="455" class="s">c⁽⁰⁾, X⁽⁰⁾</text>
  <text x="672" y="476" class="tiny">close enough to begin iteration</text>

  <!-- connector into BA -->
  <path d="M874 325 H930" fill="none" stroke="#6f8298" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="902" y="128" text-anchor="middle" class="tiny">joint refinement</text>

  <!-- Stage 4: BA -->
  <g filter="url(#shadow)"><rect x="944" y="136" width="290" height="378" rx="20" fill="url(#ba)"/></g>
  <text x="969" y="176" style="font:700 15px Arial,Helvetica,sans-serif;letter-spacing:1.2px;fill:#b9dcf7">04 · OPTIMIZE TOGETHER</text>
  <text x="969" y="207" style="font:700 21px Arial,Helvetica,sans-serif;fill:#fff">Robust bundle adjustment</text>
  <rect x="968" y="228" width="242" height="55" rx="10" fill="#0e2b4d" stroke="#467aa9"/>
  <text x="985" y="250" class="formula">min Σ ρ( rᵀ Σ⁻¹ r ) + priors</text>
  <text x="985" y="271" style="font:12px Arial,Helvetica,sans-serif;fill:#b9dcf7">weighted residuals · robust loss · constraints</text>
  <g transform="translate(972 306)">
    <rect width="234" height="122" rx="12" fill="#234e7d" stroke="#4d80ad"/>
    <g fill="#77c2ff"><rect x="21" y="24" width="22" height="18" rx="3"/><rect x="21" y="75" width="22" height="18" rx="3"/><rect x="190" y="48" width="22" height="18" rx="3"/></g>
    <g fill="#ff9a7e"><circle cx="95" cy="24" r="7"/><circle cx="137" cy="48" r="7"/><circle cx="97" cy="91" r="7"/></g>
    <g stroke="#c8e5ff" stroke-width="1.7"><path d="M43 33 L88 24 L130 48 L43 84 L90 91 L190 57 L144 48 L104 91" fill="none"/></g>
    <text x="17" y="113" style="font:12px Arial,Helvetica,sans-serif;fill:#c8e5ff">all cameras</text><text x="145" y="113" style="font:12px Arial,Helvetica,sans-serif;fill:#ffd2c6">all points</text>
  </g>
  <g transform="translate(968 450)"><path d="M0 7 H38" stroke="#ffca67" stroke-width="4" stroke-linecap="round"/><circle cx="51" cy="7" r="5" fill="#ffca67"/><text x="65" y="11" style="font:12px Arial,Helvetica,sans-serif;fill:#dceeff">downweight outlying matches</text></g>

  <!-- connector out -->
  <path d="M1248 325 H1302" fill="none" stroke="#6f8298" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="1300" y="128" text-anchor="middle" class="tiny">iterate → converge</text>

  <!-- Output inset -->
  <g filter="url(#shadow)"><rect x="1256" y="160" width="88" height="330" rx="18" fill="#edf8f3" stroke="#a9d6c0"/></g>
  <text x="1270" y="197" class="k" transform="rotate(90 1270 197)">05 · RESULT</text>
  <g transform="translate(1270 264)">
    <path d="M4 58 L24 45 L24 71 Z M52 27 L72 14 L72 40 Z" fill="#3ca678"/>
    <path d="M24 58 L43 46 L72 27 M24 58 L42 85 L72 27" stroke="#78b99e" stroke-width="1.7"/>
    <circle cx="43" cy="46" r="5" fill="#ff7757"/><circle cx="42" cy="85" r="5" fill="#ffc857"/><circle cx="56" cy="61" r="4" fill="#4b9fea"/>
  </g>
  <text x="1270" y="391" class="tiny">refined</text><text x="1270" y="409" class="tiny">cameras</text><text x="1270" y="427" class="tiny">+ points</text>

  <path d="M70 556 H1330" stroke="#dce6ef"/>
  <circle cx="85" cy="600" r="7" fill="#4b9fea"/><circle cx="110" cy="600" r="7" fill="#ff7757"/><circle cx="135" cy="600" r="7" fill="#ffc857"/>
  <text x="155" y="605" class="s">One shared objective makes each camera answer to every point it sees—and each point answer to every camera that sees it.</text>
</svg>
