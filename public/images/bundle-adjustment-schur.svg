<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="780" viewBox="0 0 1400 780" role="img" aria-labelledby="title desc">
  <title id="title">Sparse bundle adjustment and the Schur complement</title>
  <desc id="desc">An original explanatory diagram showing a camera-point observation graph, the sparse block normal system, point elimination, and the reduced camera system.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#17324d" flood-opacity=".13"/></filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#697f94"/></marker>
    <style>
      .h { font:700 25px Arial,Helvetica,sans-serif; fill:#17324d; }
      .k { font:700 14px Arial,Helvetica,sans-serif; letter-spacing:1.1px; fill:#60778e; }
      .l { font:700 19px Arial,Helvetica,sans-serif; fill:#17324d; }
      .s { font:14px Arial,Helvetica,sans-serif; fill:#50677e; }
      .t { font:12px Arial,Helvetica,sans-serif; fill:#60778e; }
      .m { font:italic 16px Georgia,'Times New Roman',serif; fill:#274b6e; }
    </style>
  </defs>
  <rect width="1400" height="780" fill="#f6f9fc"/>
  <rect x="28" y="24" width="1344" height="732" rx="26" fill="#fff" stroke="#d8e4ef"/>
  <text x="70" y="76" class="h">Why bundle adjustment scales: observe sparsely, eliminate locally, solve cameras globally</text>
  <text x="70" y="104" class="s">This is Schur-complement intuition—not an exact solver implementation or a prescribed ordering.</text>

  <!-- section 1 -->
  <g filter="url(#shadow)"><rect x="64" y="147" width="355" height="470" rx="18" fill="#fff" stroke="#cdddea"/></g>
  <text x="88" y="185" class="k">01 · OBSERVATION GRAPH</text>
  <text x="88" y="215" class="l">Only observed camera–point</text>
  <text x="88" y="238" class="l">pairs couple</text>
  <text x="88" y="261" class="s">Each feature measurement touches one camera</text>
  <text x="88" y="280" class="s">and one 3D point.</text>
  <g transform="translate(95 310)">
    <text x="2" y="0" class="t">camera blocks</text><text x="212" y="0" class="t">point blocks</text>
    <g fill="#e7f3ff" stroke="#4b9fea" stroke-width="2">
      <rect x="13" y="27" width="66" height="34" rx="8"/><rect x="13" y="109" width="66" height="34" rx="8"/><rect x="13" y="191" width="66" height="34" rx="8"/>
    </g>
    <text x="31" y="49" class="s">C₁</text><text x="31" y="131" class="s">C₂</text><text x="31" y="213" class="s">C₃</text>
    <g fill="#fff0eb" stroke="#f08062" stroke-width="2">
      <circle cx="255" cy="43" r="18"/><circle cx="255" cy="112" r="18"/><circle cx="255" cy="181" r="18"/><circle cx="255" cy="250" r="18"/>
    </g>
    <text x="247" y="48" class="s">P₁</text><text x="247" y="117" class="s">P₂</text><text x="247" y="186" class="s">P₃</text><text x="247" y="255" class="s">P₄</text>
    <g stroke="#94aabd" stroke-width="2.2">
      <path d="M79 44 L237 43 M79 44 L237 112 M79 126 L237 43 M79 126 L237 181 M79 208 L237 112 M79 208 L237 181 M79 208 L237 250"/>
    </g>
    <g fill="#4b9fea"><circle cx="82" cy="44" r="3"/><circle cx="82" cy="126" r="3"/><circle cx="82" cy="208" r="3"/></g>
    <g fill="#f08062"><circle cx="234" cy="43" r="3"/><circle cx="234" cy="112" r="3"/><circle cx="234" cy="181" r="3"/><circle cx="234" cy="250" r="3"/></g>
  </g>
  <rect x="88" y="570" width="307" height="27" rx="8" fill="#f4f8fb"/>
  <text x="101" y="588" class="t">missing edges create computational sparsity</text>

  <!-- arrow -->
  <path d="M435 380 H483" fill="none" stroke="#697f94" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="425" y="358" class="t">linearize</text>

  <!-- Section 2 normal matrix -->
  <g filter="url(#shadow)"><rect x="499" y="147" width="402" height="470" rx="18" fill="#fff" stroke="#cdddea"/></g>
  <text x="524" y="185" class="k">02 · BLOCK NORMAL SYSTEM</text>
  <text x="524" y="215" class="l">Sparse blocks mirror that graph</text>
  <text x="524" y="240" class="s">H ≈ JᵀWJ, arranged as structure (S) and cameras (C).</text>
  <g transform="translate(533 278)">
    <text x="80" y="-12" class="t">δx<tspan baseline-shift="sub" font-size="9">S</tspan></text><text x="199" y="-12" class="t">δx<tspan baseline-shift="sub" font-size="9">C</tspan></text>
    <text x="-35" y="73" class="t">δx<tspan baseline-shift="sub" font-size="9">S</tspan></text><text x="-35" y="183" class="t">δx<tspan baseline-shift="sub" font-size="9">C</tspan></text>
    <rect x="0" y="0" width="125" height="106" fill="#fff3ee" stroke="#ef967f" stroke-width="2"/>
    <rect x="125" y="0" width="125" height="106" fill="#edf6ff" stroke="#8ec3ee" stroke-width="2"/>
    <rect x="0" y="106" width="125" height="106" fill="#edf6ff" stroke="#8ec3ee" stroke-width="2"/>
    <rect x="125" y="106" width="125" height="106" fill="#e7f3ff" stroke="#4b9fea" stroke-width="2"/>
    <!-- block diagonal structure -->
    <rect x="13" y="13" width="29" height="25" rx="3" fill="#f08062"/><rect x="49" y="42" width="29" height="25" rx="3" fill="#f08062"/><rect x="85" y="72" width="29" height="25" rx="3" fill="#f08062"/>
    <!-- sparse cross blocks -->
    <rect x="143" y="17" width="25" height="19" rx="3" fill="#4b9fea"/><rect x="205" y="40" width="25" height="19" rx="3" fill="#4b9fea"/><rect x="161" y="77" width="25" height="19" rx="3" fill="#4b9fea"/>
    <rect x="16" y="126" width="25" height="19" rx="3" fill="#4b9fea"/><rect x="75" y="158" width="25" height="19" rx="3" fill="#4b9fea"/><rect x="91" y="186" width="25" height="17" rx="3" fill="#4b9fea"/>
    <!-- camera system -->
    <rect x="143" y="124" width="27" height="25" rx="3" fill="#275b93"/><rect x="181" y="151" width="27" height="25" rx="3" fill="#275b93"/><rect x="217" y="181" width="21" height="20" rx="3" fill="#275b93"/>
    <text x="32" y="58" class="m">H<tspan baseline-shift="sub" font-size="11">SS</tspan></text><text x="160" y="58" class="m">H<tspan baseline-shift="sub" font-size="11">SC</tspan></text><text x="35" y="170" class="m">H<tspan baseline-shift="sub" font-size="11">CS</tspan></text><text x="160" y="170" class="m">H<tspan baseline-shift="sub" font-size="11">CC</tspan></text>
  </g>
  <g transform="translate(532 517)"><circle cx="8" cy="0" r="6" fill="#f08062"/><text x="21" y="4" class="t">HSS: independent small point blocks</text><circle cx="8" cy="24" r="6" fill="#4b9fea"/><text x="21" y="28" class="t">cross-blocks exist only along observation edges</text></g>

  <!-- elimination arrow/label -->
  <path d="M917 380 H962" fill="none" stroke="#697f94" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="940" y="118" text-anchor="middle" class="t">eliminate each</text><text x="940" y="136" text-anchor="middle" class="t">point increment</text>
  <g transform="translate(908 408)"><rect width="62" height="52" rx="10" fill="#fff3ee" stroke="#f0a08b"/><text x="15" y="23" class="t">Pⱼ block</text><text x="12" y="40" class="t">solve locally</text></g>

  <!-- section 3 reduced -->
  <g filter="url(#shadow)"><rect x="979" y="147" width="357" height="470" rx="18" fill="#f0f8ff" stroke="#a9cee9"/></g>
  <text x="1004" y="185" class="k">03 · REDUCED SYSTEM</text>
  <text x="1004" y="215" class="l">Solve only camera increments</text>
  <text x="1004" y="240" class="s">Each eliminated point contributes</text>
  <text x="1004" y="260" class="s">camera-to-camera information.</text>
  <g transform="translate(1015 294)">
    <text x="0" y="-13" class="t">camera blocks after point elimination</text>
    <rect width="264" height="172" rx="12" fill="#fff" stroke="#b2cfe7"/>
    <g fill="#275b93"><rect x="19" y="18" width="53" height="40" rx="6"/><rect x="105" y="18" width="53" height="40" rx="6"/><rect x="191" y="18" width="53" height="40" rx="6"/><rect x="19" y="111" width="53" height="40" rx="6"/><rect x="105" y="111" width="53" height="40" rx="6"/><rect x="191" y="111" width="53" height="40" rx="6"/></g>
    <g stroke="#4b9fea" stroke-width="3"><path d="M72 38 H105 M158 38 H191 M45 58 V111 M131 58 V111 M217 58 V111 M72 131 H105 M158 131 H191"/></g>
    <g fill="#fff" style="font:700 13px Arial,Helvetica,sans-serif"><text x="35" y="43">C₁</text><text x="121" y="43">C₂</text><text x="207" y="43">C₃</text><text x="35" y="136">C₁</text><text x="121" y="136">C₂</text><text x="207" y="136">C₃</text></g>
    <text x="70" y="88" class="t">shared-point couplings</text>
  </g>
  <rect x="1005" y="482" width="305" height="62" rx="10" fill="#173b66"/>
  <text x="1021" y="508" style="font:italic 14px Georgia,'Times New Roman',serif;fill:#f0f8ff">(HCC − HCS HSS⁻¹ HSC) δxC</text>
  <text x="1021" y="530" style="font:12px Arial,Helvetica,sans-serif;fill:#b9dcf7">= −(gC − HCS HSS⁻¹ gS)</text>
  <text x="1005" y="578" class="t">then back-substitute δxS point by point</text>

  <!-- footer -->
  <path d="M70 663 H1330" stroke="#dce6ef"/>
  <g transform="translate(87 697)"><rect width="14" height="14" rx="3" fill="#f08062"/><text x="24" y="12" class="s">structure / point blocks</text><rect x="202" width="14" height="14" rx="3" fill="#4b9fea"/><text x="226" y="12" class="s">camera-related blocks and couplings</text><path d="M504 7 H545" stroke="#697f94" stroke-width="2.5" marker-end="url(#arrow)"/><text x="558" y="12" class="s">local elimination compresses point information into the camera problem</text></g>
</svg>
